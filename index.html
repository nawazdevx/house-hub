<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>HouseHub – Smart Home & Property Management Platform</title>
    <meta name="title" content="HouseHub – Smart Home & Property Management Platform" />
    <meta
      name="description"
      content="HouseHub helps you buy, sell, rent, and manage properties easily. A modern, transparent, and commission-free home management platform."
    />

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon" />

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- tailwind custom configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              spartan: ['League Spartan', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>

  <body class="font-spartan text-slate-600">
    <!-- Site Header -->
    <div id="header-root"></div>

    <!-- Hero Section -->
    <div id="hero-root"></div>

    <!-- About Section -->
    <div id="about-root"></div>

    <!-- Services Section -->
    <div id="service-root"></div>

    <!-- Property Section -->
    <div id="property-root"></div>

    <!-- Contact & Newsletter Section -->
    <div id="contact-root"></div>

    <!-- Site Footer -->
    <div id="footer-root"></div>

    <!-- back to top -->
    <div id="backtop-root"></div>

    <!-- ionicon link -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <!-- main js link  -->
    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
